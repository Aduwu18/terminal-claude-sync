services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - USER_UID=${UID:-1000}
        - USER_GID=${GID:-1000}

    image: terminal-claude-sync:latest
    container_name: terminal-claude-sync

    # --- 挂载卷 ---
    volumes:
      # 1. 项目代码
      - ..:/app/terminal-claude-sync

      # 2. Claude 配置（只读共享）
      - ~/.claude/rules:/home/developer/.claude/rules:ro
      - ~/.claude/skills:/home/developer/.claude/skills:ro
      - ~/.claude/agents:/home/developer/.claude/agents:ro
      - ~/.claude/commands:/home/developer/.claude/commands:ro
      - ~/.claude/hooks:/home/developer/.claude/hooks:ro
      - ~/.claude/plugins:/home/developer/.claude/plugins:ro
      - ~/.claude/settings.json:/home/developer/.claude/settings.json:ro

      # 3. Git 配置
      - ~/.gitconfig:/home/developer/.gitconfig:ro

    # --- 环境变量 ---
    environment:
      - APP_ID=${APP_ID}
      - APP_SECRET=${APP_SECRET}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}

    # --- 端口映射 ---
    ports:
      - "${BRIDGE_PORT:-8082}:8082"

    # --- 运行配置 ---
    ipc: host
    stdin_open: true
    tty: true
    working_dir: /app/terminal-claude-sync